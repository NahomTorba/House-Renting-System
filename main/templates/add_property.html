{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Favicon -->
    <link href="{% static 'website/img/icon-deal.png' %}" rel="icon">

    <title>Add Property</title>

    <link rel="stylesheet" href="{% static 'website/css/add_property.css' %}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>

<body>

    <div class="container">

        <h1>Add New Property</h1>

        <form method="post" enctype="multipart/form-data">

            {% csrf_token %}

            <div class="form-grid">

                <div class="form-group">
                    <label>Title</label>
                    <input type="text" name="title" required>
                </div>

                <div class="form-group">
                    <label>Property Type</label>
                    <select name="property_type">
                        <option value="villa">Villa</option>
                        <option value="apartment">Apartment</option>
                        <option value="office">Office</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Property For</label>
                    <select name="property_for">
                        <option value="rent">For Rent</option>
                        <option value="sale">For Sale</option>
                    </select>
                </div>

                <div class="form-group full">
                    <label>Description</label>
                    <textarea name="description" rows="4"></textarea>
                </div>

                <div class="form-group">
                    <label>Bedrooms</label>
                    <input type="number" name="bedrooms">
                </div>

                <div class="form-group">
                    <label>Bathrooms</label>
                    <input type="number" name="bathrooms">
                </div>

                <div class="form-group">
                    <label>Area (m²)</label>
                    <input type="number" name="area">
                </div>

                <div class="form-group">
                    <label>Price</label>
                    <input type="number" name="price">
                </div>

                <div class="form-group full">
                    <label>Location Name</label>
                    <input type="text" name="location">
                </div>

                <div class="form-group full">
                    <label>Select Property Location</label>
                    <div id="map"></div>
                </div>

                <div class="form-group full">
                    <label>Upload Image</label>
                    <input type="file" name="image">
                </div>

            </div>

            <input type="hidden" name="latitude" id="latitude">
            <input type="hidden" name="longitude" id="longitude">

            <button type="submit">Submit Property</button>

        </form>

    </div>

    <script>

        const API_KEY = "{{ GEBETA_API_KEY }}";

        var map = L.map('map').setView([9.03, 38.74], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        var marker;

        map.on('click', function (e) {

            let lat = e.latlng.lat;
            let lng = e.latlng.lng;

            if (marker) {
                map.removeLayer(marker);
            }

            marker = L.marker([lat, lng]).addTo(map);

            document.getElementById("latitude").value = lat;
            document.getElementById("longitude").value = lng;

        });

    </script>

</body>

</html>
